name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/cli @capacitor/android @capacitor/core

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

      - name: Verify dist folder
        run: |
          echo "Contenu du dossier dist :"
          ls -la dist/ || echo "ERREUR : dist/ n'existe pas"
          ls -la dist/index.html || echo "ERREUR : index.html manquant"

      - name: Add Android Platform
        run: npx cap add android || echo "Android already added"

      - name: Inject Firebase Config
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
